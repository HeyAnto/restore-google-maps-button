<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restore Google Maps Button</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <h1 class="t-white t-center">Google Maps Button</h1>

  <section class="flex flex-col gap-12">
    <div class="flex gap-12">
      <a class="btn btn-primary" href="https://ko-fi.com/heyanto" tabindex="0">
        <img class="btn-icon" src="./assets/heart-icon.svg" alt="Heart Icon">
        <p>Donate</p>
      </a>

      <a class="btn btn-secondary" href="https://github.com/HeyAnto/restore-google-maps-button" tabindex="0">
        <img class="btn-icon" src="./assets/github-icon.svg" alt="GitHub Icon">
        <p>GitHub</p>
      </a>
    </div>

    <div id="extensionToggleContainer" class="btn btn-tertiary" role="button" tabindex="0"
      aria-controls="extensionToggle" aria-label="Toggle extension on or off">
      <p class="t-white">Extension Enabled</p>
      <label class="tg" for="extensionToggle">
        <input id="extensionToggle" type="checkbox" tabindex="-1" aria-hidden="true">
        <span class="tg-ui" aria-hidden="true"></span>
      </label>
    </div>
  </section>

  <script type="module" src="popup.js"></script>
</body>

</html>
